spring:
  application:
    name: guia-gurupi-api

  datasource:
    url: jdbc:postgresql://localhost:5432/guiadegurupi
    username: ${DB_USERNAME:gurupi}
    password: ${DB_PASSWORD:gurupi123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8081
  servlet:
    context-path: /api
    
springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
      display-request-duration: true
    info:
      title: Guia Gurupi API
      description: API do marketplace local de Gurupi - TO
      version: 1.0.0
# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: guiadegurupi

# JWT
jwt:
  secret: ${JWT_SECRET:guia-gurupi-secret-key-muito-segura-2024}
  expiration: 86400000 # 24 horas em ms

# CORS
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

logging:
  level:
    br.com.guiadegurupi: DEBUG
    org.springframework.security: WARN
