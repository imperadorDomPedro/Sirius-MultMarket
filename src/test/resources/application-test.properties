# origem permitida nos testes deve bater com o preflight dos testes CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ?? Banco em memµria ? substitui PostgreSQL ??????????????????????????????????
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ?? Flyway desabilitado ? H2 cria o schema via ddl-auto ?????????????????????
spring.flyway.enabled=false

# ?? JWT dummy ????????????????????????????????????????????????????????????????
app.jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.expiration=3600000

# ?? MinIO ? desabilita tentativa de conexÐo no teste ?????????????????????????
