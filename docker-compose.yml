version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: guiadegurupi-postgres
    environment:
      POSTGRES_DB: guiadegurupi
      POSTGRES_USER: gurupi
      POSTGRES_PASSWORD: gurupi123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: guiadegurupi-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
